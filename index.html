<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fake Series ID Generator — Frndly TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#2d3436}
  .header{background:#1e272e;color:white;padding:18px 32px}
  .header h1{font-size:20px;font-weight:600}
  .header p{font-size:12px;color:#a4b0be;margin-top:4px}
  .content{max-width:800px;margin:0 auto;padding:24px 16px}

  /* Auth */
  .auth-box{background:white;border-radius:10px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .auth-box.unauthed{border-left:4px solid #e74c3c}
  .auth-box.authed{border-left:4px solid #27ae60}
  .auth-label{font-size:13px;font-weight:600;color:#636e72;white-space:nowrap}
  .auth-input{flex:1;min-width:200px;border:1px solid #dfe6e9;border-radius:6px;padding:8px 12px;font-size:13px;font-family:monospace}
  .auth-input:focus{outline:none;border-color:#4C72B0}
  .auth-btn{background:#4C72B0;color:white;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .auth-btn:hover{background:#3a5a9a}
  .auth-status{font-size:13px;color:#2d3436}
  .signout{font-size:12px;color:#b2bec3;cursor:pointer;text-decoration:underline;margin-left:auto}

  /* Generate */
  .gen-box{background:white;border-radius:10px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
  .gen-box h2{font-size:15px;font-weight:600;margin-bottom:16px}
  .note-input{width:100%;border:1px solid #dfe6e9;border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:14px}
  .note-input:focus{outline:none;border-color:#4C72B0}
  .gen-btn{background:#27ae60;color:white;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:0.2px}
  .gen-btn:hover:not(:disabled){background:#219a52}
  .gen-btn:disabled{background:#b2bec3;cursor:not-allowed}

  /* Result */
  .result{display:none;background:#f0f9f4;border:2px solid #27ae60;border-radius:10px;padding:24px;margin-top:16px;text-align:center}
  .result.show{display:block}
  .result-label{font-size:11px;color:#636e72;text-transform:uppercase;letter-spacing:0.8px}
  .result-id{font-size:56px;font-weight:800;color:#1e272e;letter-spacing:-2px;line-height:1.1;margin:8px 0;font-variant-numeric:tabular-nums}
  .copy-btn{background:#1e272e;color:white;border:none;border-radius:6px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
  .copy-btn:hover{background:#2d3436}
  .copy-btn.copied{background:#27ae60}
  .err{font-size:12px;color:#e74c3c;margin-top:10px;display:none}
  .err.show{display:block}

  /* History */
  .history-box{background:white;border-radius:10px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .history-box h2{font-size:15px;font-weight:600;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 12px;border-bottom:2px solid #f0f2f5;color:#636e72;font-weight:600;font-size:12px}
  td{padding:10px 12px;border-bottom:1px solid #f0f2f5}
  tr:last-child td{border-bottom:none}
  .id-num{font-weight:700;font-size:14px;color:#4C72B0;font-family:monospace;letter-spacing:0.3px}
  .empty{text-align:center;padding:40px;color:#b2bec3;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>Fake Series ID Generator</h1>
  <p>Frndly TV CMS &nbsp;·&nbsp; IDs start at 9,990,001 and increment sequentially &nbsp;·&nbsp; All IDs stored permanently in GitHub</p>
</div>

<div class="content">

  <!-- Auth -->
  <div class="auth-box unauthed" id="auth-box">
    <div id="unauthed" style="display:flex;align-items:center;gap:12px;width:100%;flex-wrap:wrap">
      <span class="auth-label">GitHub Token</span>
      <input type="password" class="auth-input" id="pat-input" placeholder="github_pat_..." autocomplete="off"
             onkeydown="if(event.key==='Enter')authenticate()">
      <button class="auth-btn" onclick="authenticate()">Connect</button>
    </div>
    <div id="authed" style="display:none;width:100%;align-items:center;gap:8px">
      <span style="color:#27ae60;font-size:18px">&#10003;</span>
      <span class="auth-status" id="auth-name"></span>
      <span class="signout" onclick="signOut()">Sign out</span>
    </div>
  </div>

  <!-- Generate -->
  <div class="gen-box">
    <h2>Generate New ID</h2>
    <input type="text" class="note-input" id="note-input"
           placeholder="Optional: what is this ID for? (e.g. UpFaith landing page refresh)"
           onkeydown="if(event.key==='Enter')generateId()">
    <button class="gen-btn" id="gen-btn" onclick="generateId()" disabled>Generate ID</button>
    <div class="err" id="err-msg">Something went wrong — check your token and try again.</div>
    <div class="result" id="result">
      <div class="result-label">Your new fake series ID</div>
      <div class="result-id" id="result-id"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyId()">Copy to Clipboard</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-box">
    <h2>ID History <span id="hist-count" style="font-weight:400;color:#b2bec3;font-size:13px"></span></h2>
    <div id="history"><div class="empty">Loading...</div></div>
  </div>

</div>

<script>
const REPO    = 'pbreuer5280/fake-series-ids';
const API_URL = `https://api.github.com/repos/${REPO}/contents/ids.json`;
const RAW_URL = `https://raw.githubusercontent.com/${REPO}/main/ids.json`;

// ── Auth ──────────────────────────────────────────────────────────────────────
function getPAT(){ return sessionStorage.getItem('gh_pat'); }

async function authenticate(){
  const pat = document.getElementById('pat-input').value.trim();
  if(!pat) return;
  try {
    const r = await fetch('https://api.github.com/user',
      { headers:{ 'Authorization':`Bearer ${pat}` } });
    if(!r.ok) throw new Error();
    const u = await r.json();
    sessionStorage.setItem('gh_pat', pat);
    sessionStorage.setItem('gh_user', u.login || 'Unknown');
    setAuthed(u.login || 'Unknown');
  } catch {
    alert('Could not authenticate. Check your token.');
  }
}

function setAuthed(username){
  document.getElementById('auth-box').className = 'auth-box authed';
  document.getElementById('unauthed').style.display = 'none';
  const a = document.getElementById('authed');
  a.style.display = 'flex';
  document.getElementById('auth-name').textContent = `Connected as ${username}`;
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('pat-input').value = '';
}

function signOut(){
  sessionStorage.clear();
  document.getElementById('auth-box').className = 'auth-box unauthed';
  document.getElementById('unauthed').style.display = 'flex';
  document.getElementById('authed').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('result').className = 'result';
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generateId(){
  const pat = getPAT();
  if(!pat) return;
  const btn = document.getElementById('gen-btn');
  const err = document.getElementById('err-msg');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  err.className = 'err';

  try {
    // Fetch current file + SHA (authenticated to avoid stale cache)
    const r = await fetch(API_URL, {
      headers:{ 'Authorization':`Bearer ${pat}`, 'Accept':'application/vnd.github+json' }
    });
    if(!r.ok) throw new Error('load');
    const meta = await r.json();
    const data = JSON.parse(atob(meta.content.replace(/\s/g,'')));

    const newId    = data.last_id + 1;
    const note     = document.getElementById('note-input').value.trim();
    const username = sessionStorage.getItem('gh_user') || 'Unknown';

    data.last_id = newId;
    data.ids.unshift({ id:newId, date:new Date().toISOString().split('T')[0],
                       generated_by:username, note:note||null });

    const put = await fetch(API_URL, {
      method:'PUT',
      headers:{
        'Authorization':`Bearer ${pat}`,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        message:`Add fake series ID ${newId}${note?' — '+note:''}`,
        content: btoa(JSON.stringify(data, null, 2)),
        sha: meta.sha
      })
    });
    if(!put.ok) throw new Error('save');

    document.getElementById('result-id').textContent = newId;
    document.getElementById('result').className = 'result show';
    document.getElementById('copy-btn').textContent = 'Copy to Clipboard';
    document.getElementById('copy-btn').className = 'copy-btn';
    document.getElementById('note-input').value = '';
    renderHistory(data.ids);

  } catch {
    err.className = 'err show';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate ID';
  }
}

function copyId(){
  const id = document.getElementById('result-id').textContent.replace(/,/g,'');
  navigator.clipboard.writeText(id).then(()=>{
    const b = document.getElementById('copy-btn');
    b.textContent = 'Copied!';
    b.className = 'copy-btn copied';
    setTimeout(()=>{ b.textContent='Copy to Clipboard'; b.className='copy-btn'; }, 2000);
  });
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(ids){
  document.getElementById('hist-count').textContent = ids.length ? `(${ids.length} total)` : '';
  if(!ids.length){
    document.getElementById('history').innerHTML = '<div class="empty">No IDs generated yet.</div>';
    return;
  }
  const rows = ids.map(e=>`
    <tr>
      <td class="id-num">${e.id}</td>
      <td>${e.date}</td>
      <td>${e.generated_by||'—'}</td>
      <td>${e.note||'<span style="color:#b2bec3">—</span>'}</td>
    </tr>`).join('');
  document.getElementById('history').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>Date</th><th>Generated By</th><th>Note</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  const pat = getPAT();
  if(pat) setAuthed(sessionStorage.getItem('gh_user')||'Unknown');
  try {
    const r    = await fetch(RAW_URL+'?t='+Date.now());
    const data = await r.json();
    renderHistory(data.ids);
  } catch {
    document.getElementById('history').innerHTML = '<div class="empty">Could not load history.</div>';
  }
}

window.onload = init;
</script>
</body>
</html>
